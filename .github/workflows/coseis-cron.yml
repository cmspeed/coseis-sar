name: COSEIS Forward Email Notifications

on:
  schedule:
    # Runs every 50 minutes
    - cron: '*/50 * * * *'
  workflow_dispatch:

jobs:
  run-coseis-notifications:
    runs-on: ubuntu-latest
    
    timeout-minutes: 45 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install asf_search beautifulsoup4 python-dateutil requests folium geojson geopandas lxml premailer shapely tabulate yagmail
          # Install next_pass directly from the GitHub repository
          pip install git+https://github.com/OPERA-Cal-Val/next_pass.git

      - name: Run COSEIS Forward Script (Email Only)
        env:
          COSEIS_PRIMARY_RECIPIENTS: ${{ secrets.COSEIS_PRIMARY_RECIPIENTS }}
          COSEIS_SECONDARY_RECIPIENTS: ${{ secrets.COSEIS_SECONDARY_RECIPIENTS }}
          COSEIS_TERTIARY_RECIPIENTS: ${{ secrets.COSEIS_TERTIARY_RECIPIENTS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PSWD: ${{ secrets.GMAIL_APP_PSWD }}
        run: |
          # Navigate to the scripts directory
          cd scripts
          
          # Execute the Python script
          python coseis.py --forward --pairing coseismic

      - name: Save Tracking State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage the JSON file, the new partial jobs, and the maps directory
          git add scripts/active_job_tracking.json || true
          git add scripts/*_partial.json || true
          git add docs/maps/*.html || true          
          
          # Check if the file actually changed before trying to commit and push
          if ! git diff --cached --quiet; then
            git commit -m "Update COSEIS tracking state and add new maps [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit. Skipping."
          fi